spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cepdb
    username: cepuser
    password: ceppass
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

cep:
  api:
    base-url: http://localhost:8089

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
