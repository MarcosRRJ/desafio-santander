services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cepdb
      POSTGRES_USER: cepuser
      POSTGRES_PASSWORD: ceppass
    ports:
      - "5432:5432"

  wiremock:
    image: wiremock/wiremock:3.5.4
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock
